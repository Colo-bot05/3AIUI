services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install && (npm run db:migrate || echo '[db] migrate skipped or failed') && npm run dev -- --hostname 0.0.0.0"
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: three_ai_ui
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_node_modules:
  postgres_data:
